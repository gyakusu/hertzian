# Static-analysis source of truth. CI runs these exact hooks via
# `uv run pre-commit run --all-files`, so local commits and CI never diverge.
#
# Python tools are invoked through `uv run` so their versions come from
# uv.lock (no raw pip / no separately pinned hook versions to drift).
minimum_pre_commit_version: "3.5.0"
default_install_hook_types: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run --no-sync ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff (format)
        entry: uv run --no-sync ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: mypy
        name: mypy (strict)
        entry: uv run --no-sync mypy
        language: system
        types_or: [python, pyi]
        pass_filenames: false

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy (-D warnings)
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: no-raw-python
        name: forbid raw Python (uv only)
        entry: scripts/check-no-raw-python.sh
        language: system
        pass_filenames: false
        always_run: true
